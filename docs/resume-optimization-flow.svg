<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1100" height="600" rx="16" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Resume Optimization Flow</text>
  <text x="550" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">End-to-end pipeline from job URL to optimized resume on Google Drive</text>

  <!-- Step 1: User Input -->
  <rect x="30" y="100" width="150" height="90" rx="10" fill="#3b82f6" filter="url(#sh2)"/>
  <text x="105" y="127" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1. USER INPUT</text>
  <text x="105" y="147" text-anchor="middle" fill="#dbeafe" font-size="9">Job URL or Manual JD</text>
  <text x="105" y="163" text-anchor="middle" fill="#dbeafe" font-size="9">+ AI Provider Keys</text>
  <text x="105" y="179" text-anchor="middle" fill="#93c5fd" font-size="8">Chrome Extension / Web</text>

  <!-- Arrow 1�2 -->
  <line x1="180" y1="145" x2="220" y2="145" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: JD Extraction -->
  <rect x="225" y="100" width="150" height="90" rx="10" fill="#8b5cf6" filter="url(#sh2)"/>
  <text x="300" y="127" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2. JD EXTRACTION</text>
  <text x="300" y="147" text-anchor="middle" fill="#ede9fe" font-size="9">Playwright fetches URL</text>
  <text x="300" y="163" text-anchor="middle" fill="#ede9fe" font-size="9">or uses manual text</text>
  <text x="300" y="179" text-anchor="middle" fill="#c4b5fd" font-size="8">AI parses JD � structured</text>

  <!-- Arrow 2�3 -->
  <line x1="375" y1="145" x2="415" y2="145" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3: Company Context -->
  <rect x="420" y="100" width="150" height="90" rx="10" fill="#06b6d4" filter="url(#sh2)"/>
  <text x="495" y="127" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3. COMPANY CONTEXT</text>
  <text x="495" y="147" text-anchor="middle" fill="#cffafe" font-size="9">Tavily API search</text>
  <text x="495" y="163" text-anchor="middle" fill="#cffafe" font-size="9">Jina Reader fallback</text>
  <text x="495" y="179" text-anchor="middle" fill="#67e8f9" font-size="8">Tech stack &amp; culture data</text>

  <!-- Arrow 3�4 -->
  <line x1="570" y1="145" x2="610" y2="145" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Step 4: AI Optimization -->
  <rect x="615" y="100" width="150" height="90" rx="10" fill="#10b981" filter="url(#sh2)"/>
  <text x="690" y="122" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4. AI OPTIMIZATION</text>
  <text x="690" y="142" text-anchor="middle" fill="#d1fae5" font-size="9">Gemini 2.0 / GPT-4</text>
  <text x="690" y="158" text-anchor="middle" fill="#d1fae5" font-size="9">ATS-optimized rewrite</text>
  <text x="690" y="174" text-anchor="middle" fill="#6ee7b7" font-size="8">8-20 improvements</text>
  <text x="690" y="186" text-anchor="middle" fill="#6ee7b7" font-size="8">85-92% ATS score target</text>

  <!-- Arrow 4�5 -->
  <line x1="765" y1="145" x2="805" y2="145" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: Google Docs -->
  <rect x="810" y="100" width="150" height="90" rx="10" fill="#f59e0b" filter="url(#sh2)"/>
  <text x="885" y="127" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5. GOOGLE DOCS</text>
  <text x="885" y="147" text-anchor="middle" fill="#fef3c7" font-size="9">Create new Doc</text>
  <text x="885" y="163" text-anchor="middle" fill="#fef3c7" font-size="9">Apply formatting</text>
  <text x="885" y="179" text-anchor="middle" fill="#fcd34d" font-size="8">Skills table + styling</text>

  <!-- Arrow 5�6 (down) -->
  <line x1="885" y1="190" x2="885" y2="260" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <!-- Step 6: Google Drive -->
  <rect x="810" y="265" width="150" height="80" rx="10" fill="#f59e0b" filter="url(#sh2)" opacity="0.85"/>
  <text x="885" y="292" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6. GOOGLE DRIVE</text>
  <text x="885" y="312" text-anchor="middle" fill="#fef3c7" font-size="9">Upload to folder</text>
  <text x="885" y="328" text-anchor="middle" fill="#fcd34d" font-size="8">Name_Position_Company</text>

  <!-- Arrow 6�7 (left) -->
  <line x1="810" y1="305" x2="765" y2="305" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 7: Database -->
  <rect x="615" y="265" width="150" height="80" rx="10" fill="#ef4444" filter="url(#sh2)"/>
  <text x="690" y="292" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">7. POSTGRESQL</text>
  <text x="690" y="312" text-anchor="middle" fill="#fecaca" font-size="9">Save application record</text>
  <text x="690" y="328" text-anchor="middle" fill="#fca5a5" font-size="8">Company " Position " Link</text>

  <!-- Arrow 7�8 (left) -->
  <line x1="615" y1="305" x2="575" y2="305" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 8: Tracking Sheet -->
  <rect x="420" y="265" width="150" height="80" rx="10" fill="#06b6d4" filter="url(#sh2)" opacity="0.85"/>
  <text x="495" y="292" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">8. TRACKING SHEET</text>
  <text x="495" y="312" text-anchor="middle" fill="#cffafe" font-size="9">Google Sheets update</text>
  <text x="495" y="328" text-anchor="middle" fill="#67e8f9" font-size="8">Row with all metadata</text>

  <!-- Arrow 8�9 (left) -->
  <line x1="420" y1="305" x2="380" y2="305" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 9: Response -->
  <rect x="225" y="265" width="150" height="80" rx="10" fill="#3b82f6" filter="url(#sh2)"/>
  <text x="300" y="292" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">9. RESPONSE</text>
  <text x="300" y="312" text-anchor="middle" fill="#dbeafe" font-size="9">Resume link + metadata</text>
  <text x="300" y="328" text-anchor="middle" fill="#93c5fd" font-size="8">Displayed in extension</text>

  <!-- Checkpoint Box -->
  <rect x="30" y="385" width="500" height="70" rx="10" fill="#334155" filter="url(#sh2)" stroke="#475569" stroke-width="1"/>
  <text x="280" y="410" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">Checkpoint System (Long-Running Optimizations)</text>
  <text x="280" y="432" text-anchor="middle" fill="#94a3b8" font-size="10">Each step is checkpointed to PostgreSQL  sessions can be resumed if interrupted</text>
  <text x="280" y="446" text-anchor="middle" fill="#64748b" font-size="9">Session ID � checkpoint.js � optimization_checkpoints table</text>

  <!-- Recruiter Automation Branch -->
  <rect x="580" y="385" width="480" height="70" rx="10" fill="#334155" filter="url(#sh2)" stroke="#475569" stroke-width="1"/>
  <text x="820" y="410" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">Optional: Recruiter Automation</text>
  <text x="820" y="432" text-anchor="middle" fill="#94a3b8" font-size="10">SerpAPI � AI Top-3 Selection � Hunter.io Email � Gmail Draft Creation</text>
  <text x="820" y="446" text-anchor="middle" fill="#64748b" font-size="9">Triggered from Dashboard � Application � "Find Recruiters"</text>

  <!-- Timing bar -->
  <rect x="30" y="490" width="1040" height="45" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="514" fill="#94a3b8" font-size="11" font-weight="600">TIMING:</text>
  <text x="130" y="514" fill="#60a5fa" font-size="10">URL Fetch: 2-5s</text>
  <text x="280" y="514" fill="#a78bfa" font-size="10">JD Parse: 3-8s</text>
  <text x="420" y="514" fill="#22d3ee" font-size="10">Context: 2-4s</text>
  <text x="560" y="514" fill="#34d399" font-size="10">AI Optimize: 15-25s</text>
  <text x="740" y="514" fill="#fbbf24" font-size="10">Doc Creation: 2-5s</text>
  <text x="920" y="514" fill="#f8fafc" font-size="10" font-weight="600">Total: 30-60s</text>

  <!-- Legend -->
  <rect x="30" y="550" width="1040" height="35" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="573" fill="#64748b" font-size="10">Flow: User Input � JD Extraction � Company Research � AI Optimization � Google Docs/Drive � Database � Tracking Sheet � Response to User</text>
</svg>
