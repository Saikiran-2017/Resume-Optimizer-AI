<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="ext" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="server" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="analysis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="db" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="api" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="ui" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="45" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Job Aggregator AI  System Architecture</text>
  <text x="550" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">Resume Optimization " Auto-Apply Bot " Application Tracking " Recruiter Automation</text>

  <!-- ============ Chrome Extension ============ -->
  <rect x="30" y="100" width="200" height="140" rx="12" fill="url(#ext)" filter="url(#shadow)" opacity="0.95"/>
  <text x="130" y="130" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Chrome Extension</text>
  <text x="130" y="150" text-anchor="middle" fill="#dbeafe" font-size="11">Manifest V3</text>
  <line x1="55" y1="162" x2="205" y2="162" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="130" y="180" text-anchor="middle" fill="#dbeafe" font-size="10">popup.js " options.js</text>
  <text x="130" y="196" text-anchor="middle" fill="#dbeafe" font-size="10">results.js " background.js</text>
  <text x="130" y="212" text-anchor="middle" fill="#dbeafe" font-size="10">Analyze / Optimize Modes</text>
  <text x="130" y="228" text-anchor="middle" fill="#93c5fd" font-size="9">URL &amp; Manual JD Input</text>

  <!-- ============ Web Dashboard ============ -->
  <rect x="30" y="280" width="200" height="140" rx="12" fill="url(#ui)" filter="url(#shadow)" opacity="0.95"/>
  <text x="130" y="310" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Web Dashboard</text>
  <text x="130" y="330" text-anchor="middle" fill="#fce7f3" font-size="11">Static HTML/JS/CSS</text>
  <line x1="55" y1="342" x2="205" y2="342" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="130" y="358" text-anchor="middle" fill="#fce7f3" font-size="10">Dashboard  KPIs &amp; Charts</text>
  <text x="130" y="374" text-anchor="middle" fill="#fce7f3" font-size="10">Application Detail &amp; Notes</text>
  <text x="130" y="390" text-anchor="middle" fill="#fce7f3" font-size="10">Auto-Apply Control Panel</text>
  <text x="130" y="406" text-anchor="middle" fill="#f9a8d4" font-size="9">Profile Settings</text>

  <!-- ============ Backend Server ============ -->
  <rect x="340" y="100" width="340" height="320" rx="12" fill="url(#server)" filter="url(#shadow)" opacity="0.95"/>
  <text x="510" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Backend Server</text>
  <text x="510" y="150" text-anchor="middle" fill="#d1fae5" font-size="12">Express 5  Port 3000</text>
  <line x1="365" y1="162" x2="655" y2="162" stroke="#6ee7b7" stroke-width="0.5"/>

  <text x="380" y="185" fill="#fff" font-size="11" font-weight="600">API Modules:</text>
  <text x="395" y="204" fill="#d1fae5" font-size="10">" Resume Optimization (AI + Google Docs)</text>
  <text x="395" y="220" fill="#d1fae5" font-size="10">" Application CRUD &amp; Search</text>
  <text x="395" y="236" fill="#d1fae5" font-size="10">" Dashboard Stats &amp; CSV Export</text>
  <text x="395" y="252" fill="#d1fae5" font-size="10">" Recruiter Automation (SerpAPI + Hunter)</text>
  <text x="395" y="268" fill="#d1fae5" font-size="10">" Notes &amp; Contacts Management</text>
  <text x="395" y="284" fill="#d1fae5" font-size="10">" Company Context (Tavily + Jina)</text>
  <text x="395" y="300" fill="#d1fae5" font-size="10">" OAuth Flows (Google + Gmail)</text>

  <line x1="365" y1="312" x2="655" y2="312" stroke="#6ee7b7" stroke-width="0.5"/>
  <text x="380" y="332" fill="#fff" font-size="11" font-weight="600">Infrastructure:</text>
  <text x="395" y="351" fill="#d1fae5" font-size="10">" HTTP Server + WebSocket (/ws/auto-apply)</text>
  <text x="395" y="367" fill="#d1fae5" font-size="10">" Playwright (JD Fetching)</text>
  <text x="395" y="383" fill="#d1fae5" font-size="10">" Optimization Checkpoints</text>
  <text x="395" y="399" fill="#d1fae5" font-size="10">" Static File Serving (public/)</text>

  <!-- ============ Analysis Server ============ -->
  <rect x="340" y="450" width="340" height="100" rx="12" fill="url(#analysis)" filter="url(#shadow)" opacity="0.95"/>
  <text x="510" y="480" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Analysis Server</text>
  <text x="510" y="500" text-anchor="middle" fill="#ede9fe" font-size="11">Express  Port 3001</text>
  <line x1="365" y1="510" x2="655" y2="510" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="510" y="530" text-anchor="middle" fill="#ede9fe" font-size="10">4-Score Resume Analysis (Match " Fit " Potential " Probability)</text>

  <!-- ============ Auto-Apply Bot ============ -->
  <rect x="340" y="580" width="340" height="140" rx="12" fill="url(#bot)" filter="url(#shadow)" opacity="0.95"/>
  <text x="510" y="610" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Auto-Apply Bot</text>
  <text x="510" y="630" text-anchor="middle" fill="#fef3c7" font-size="11">Playwright Chromium  AI Agent</text>
  <line x1="365" y1="642" x2="655" y2="642" stroke="#fcd34d" stroke-width="0.5"/>
  <text x="395" y="660" fill="#fef3c7" font-size="10">" ATS Detection (Workday " Greenhouse " Generic)</text>
  <text x="395" y="676" fill="#fef3c7" font-size="10">" Page Scanner + Field Filler</text>
  <text x="395" y="692" fill="#fef3c7" font-size="10">" AI Field Mapping (profile.json)</text>
  <text x="395" y="708" fill="#fef3c7" font-size="10">" State Machine + Live WebSocket Updates</text>

  <!-- ============ PostgreSQL ============ -->
  <rect x="790" y="100" width="260" height="160" rx="12" fill="url(#db)" filter="url(#shadow)" opacity="0.95"/>
  <text x="920" y="130" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">PostgreSQL</text>
  <text x="920" y="150" text-anchor="middle" fill="#fecaca" font-size="11">Primary Database</text>
  <line x1="815" y1="162" x2="1025" y2="162" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="830" y="182" fill="#fecaca" font-size="10">" applications (with tsvector search)</text>
  <text x="830" y="198" fill="#fecaca" font-size="10">" notes &amp; contacts</text>
  <text x="830" y="214" fill="#fecaca" font-size="10">" optimization_checkpoints</text>
  <text x="830" y="230" fill="#fecaca" font-size="10">" bot_sessions</text>
  <text x="830" y="246" fill="#fca5a5" font-size="9">" application_contacts (join table)</text>

  <!-- ============ Google APIs ============ -->
  <rect x="790" y="290" width="260" height="130" rx="12" fill="url(#api)" filter="url(#shadow)" opacity="0.95"/>
  <text x="920" y="320" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Google APIs</text>
  <text x="920" y="340" text-anchor="middle" fill="#cffafe" font-size="11">OAuth 2.0 (2 Clients)</text>
  <line x1="815" y1="352" x2="1025" y2="352" stroke="#67e8f9" stroke-width="0.5"/>
  <text x="830" y="370" fill="#cffafe" font-size="10">" Docs API  Resume creation</text>
  <text x="830" y="386" fill="#cffafe" font-size="10">" Drive API  Upload &amp; organize</text>
  <text x="830" y="402" fill="#cffafe" font-size="10">" Sheets API  Tracking sheet</text>
  <text x="830" y="418" fill="#67e8f9" font-size="9">" Gmail API  Recruiter email drafts</text>

  <!-- ============ AI & External APIs ============ -->
  <rect x="790" y="450" width="260" height="130" rx="12" fill="#334155" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
  <text x="920" y="478" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">AI &amp; External Services</text>
  <line x1="815" y1="490" x2="1025" y2="490" stroke="#475569" stroke-width="0.5"/>
  <text x="830" y="510" fill="#cbd5e1" font-size="10">" Google Gemini 2.0 Flash</text>
  <text x="830" y="526" fill="#cbd5e1" font-size="10">" OpenAI GPT-4 / GPT-4.1-mini</text>
  <text x="830" y="542" fill="#cbd5e1" font-size="10">" SerpAPI  LinkedIn search</text>
  <text x="830" y="558" fill="#cbd5e1" font-size="10">" Hunter.io  Email discovery</text>
  <text x="830" y="574" fill="#94a3b8" font-size="9">" Tavily &amp; Jina  Company research</text>

  <!-- ============ Connection Arrows ============ -->
  <!-- Extension � Backend -->
  <line x1="230" y1="170" x2="340" y2="170" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="335,165 345,170 335,175" fill="#60a5fa"/>
  <text x="285" y="162" text-anchor="middle" fill="#94a3b8" font-size="9">HTTP</text>

  <!-- Dashboard � Backend -->
  <line x1="230" y1="340" x2="340" y2="280" stroke="#f472b6" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="335,275 345,280 336,285" fill="#f472b6"/>
  <text x="275" y="298" text-anchor="middle" fill="#94a3b8" font-size="9">REST + WS</text>

  <!-- Extension � Analysis -->
  <line x1="200" y1="240" x2="200" y2="455" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="455" x2="340" y2="490" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="335,486 345,490 335,494" fill="#a78bfa"/>
  <text x="155" y="370" fill="#94a3b8" font-size="9" transform="rotate(-90,155,370)">HTTP :3001</text>

  <!-- Backend � PostgreSQL -->
  <line x1="680" y1="180" x2="790" y2="180" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="785,175 795,180 785,185" fill="#f87171"/>
  <text x="735" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">pg Pool</text>

  <!-- Backend � Google APIs -->
  <line x1="680" y1="320" x2="790" y2="350" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="785,346 795,350 785,355" fill="#22d3ee"/>
  <text x="735" y="325" text-anchor="middle" fill="#94a3b8" font-size="9">OAuth2</text>

  <!-- Backend � AI APIs -->
  <line x1="680" y1="380" x2="790" y2="500" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="785,496 795,500 785,504" fill="#94a3b8"/>

  <!-- Backend � Auto-Apply -->
  <line x1="510" y1="420" x2="510" y2="580" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="505,575 510,585 515,575" fill="#fbbf24"/>
  <text x="525" y="500" fill="#94a3b8" font-size="9">Pipeline</text>

  <!-- Auto-Apply � Bot State � WS -->
  <line x1="460" y1="580" x2="460" y2="420" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="455,425 460,415 465,425" fill="#fbbf24"/>
  <text x="440" y="500" fill="#94a3b8" font-size="9" text-anchor="end">WS</text>

  <!-- Legend -->
  <rect x="30" y="755" width="1040" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="778" fill="#94a3b8" font-size="11" font-weight="600">LEGEND:</text>
  <line x1="120" y1="775" x2="160" y2="775" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="168" y="779" fill="#94a3b8" font-size="10">HTTP/REST</text>
  <line x1="260" y1="775" x2="300" y2="775" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="308" y="779" fill="#94a3b8" font-size="10">WebSocket</text>
  <line x1="400" y1="775" x2="440" y2="775" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="448" y="779" fill="#94a3b8" font-size="10">Database</text>
  <line x1="530" y1="775" x2="570" y2="775" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="578" y="779" fill="#94a3b8" font-size="10">Google OAuth</text>
  <rect x="690" y="768" width="14" height="14" rx="3" fill="url(#server)"/>
  <text x="712" y="779" fill="#94a3b8" font-size="10">Backend</text>
  <rect x="780" y="768" width="14" height="14" rx="3" fill="url(#ext)"/>
  <text x="802" y="779" fill="#94a3b8" font-size="10">Client</text>
  <rect x="850" y="768" width="14" height="14" rx="3" fill="url(#db)"/>
  <text x="872" y="779" fill="#94a3b8" font-size="10">Storage</text>
  <rect x="935" y="768" width="14" height="14" rx="3" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="957" y="779" fill="#94a3b8" font-size="10">External</text>
</svg>
